<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Secret Diary</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.card img{
width:100%;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<header>My Secret Diary</header>

<div class="container">

<h3>New Diary Entry</h3>

<input id="title" placeholder="Title">

<textarea id="content" placeholder="Write your memory..."></textarea>

<input type="file" id="image">

<button onclick="saveEntry()">Save Entry</button>

<h3>Diary Entries</h3>

<div id="entries"></div>

</div>

<script>

const API = "https://secretlyn.yashavanthan22.workers.dev"

async function saveEntry(){

const title=document.getElementById("title").value
const content=document.getElementById("content").value
const image=document.getElementById("image").files[0]

let imageName=""

if(image){

imageName=Date.now()+"_"+image.name

await fetch("https://api.cloudflare.com/client/v4/accounts/06bcb893022e1ad43ce8b7200100d3b3/r2/buckets/user-photos/objects/"+imageName,{
method:"PUT",
headers:{
Authorization:"Bearer YOUR_API_TOKEN"
},
body:image
})

}

await fetch(API+"/save",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
title,
content,
image:imageName
})
})

loadEntries()

}

async function loadEntries(){

const res=await fetch(API+"/list")
const data=await res.json()

const box=document.getElementById("entries")
box.innerHTML=""

for(let item of data.result){

const id=item.name.replace("diary:","")

const r=await fetch(API+"/get?id="+id)
const d=await r.json()

let img=""

if(d.image){
img=`<img src="https://pub-c91284acac5e4383a69c7cfd585ae61.r2.dev/${d.image}">`
}

box.innerHTML+=`
<div class="card">
<h4>${d.title}</h4>
<p>${d.content}</p>
${img}
</div>
`

}

}

loadEntries()

</script>

</body>
</html>
