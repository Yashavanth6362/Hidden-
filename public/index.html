<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 CODE VAULT · secret snippets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', monospace;
        }

        body {
            background: #0c0f17;
            color: #e0e6f0;
            min-height: 100vh;
        }

        .vault-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, #1f2a3f, #0a0e1a);
            z-index: -2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #3f4f70;
            border-radius: 60px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 22px;
            font-weight: 600;
            color: #c0d4ff;
        }

        .logo i {
            color: #ffaa5e;
            font-size: 28px;
            filter: drop-shadow(0 0 8px #ffaa5e);
        }

        .badge {
            background: #2a3f60;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            border-left: 4px solid #ffaa5e;
        }

        /* main card */
        .vault-card {
            background: rgba(18, 28, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #4f6a9a;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 50px -10px black;
        }

        /* form section */
        .form-section {
            background: #0f1a28;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid #5f7fb0;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffd28f;
            border-bottom: 2px solid #5f7fb0;
            padding-bottom: 15px;
        }

        .section-title i {
            color: #ffaa5e;
        }

        .input-field {
            width: 100%;
            background: #1a263a;
            border: 2px solid #3f5a85;
            border-radius: 40px;
            padding: 18px 25px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
            font-family: 'Fira Code', monospace;
        }

        .input-field:focus {
            border-color: #ffaa5e;
            box-shadow: 0 0 15px #ffaa5e66;
        }

        textarea.input-field {
            min-height: 250px;
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
            resize: vertical;
        }

        .tag-input {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tag-input input {
            flex: 1;
            background: #1a263a;
            border: 2px solid #3f5a85;
            border-radius: 40px;
            padding: 15px 20px;
            color: white;
            font-family: 'Fira Code', monospace;
        }

        .btn-save {
            background: linear-gradient(135deg, #ffaa5e, #ff7e5f);
            border: none;
            color: #0a0e1a;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 1px solid #ffd28f;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px #ff7e5f80;
        }

        /* code grid */
        .code-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .code-item {
            background: #0f1a2c;
            border-radius: 40px;
            overflow: hidden;
            border: 2px solid #3f5f8a;
            transition: 0.2s;
            position: relative;
        }

        .code-item:hover {
            border-color: #ffaa5e;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px #000000cc;
        }

        .code-header {
            background: #1a2b44;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3f5f8a;
        }

        .code-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffd28f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .code-title i {
            color: #ffaa5e;
        }

        .copy-btn {
            background: #2a3f60;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border: 1px solid #5f7fb0;
        }

        .copy-btn:hover {
            background: #ffaa5e;
            color: #0a0e1a;
            border-color: #ffd28f;
        }

        .copy-btn.copied {
            background: #4caf92;
            border-color: #8fffd0;
        }

        .code-body {
            padding: 20px;
            background: #0a121f;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-body pre {
            margin: 0;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e0e6f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* syntax colors */
        .code-body .keyword { color: #ff7e5f; }
        .code-body .string { color: #a5d6ff; }
        .code-body .comment { color: #7f9fbf; }
        .code-body .function { color: #ffd28f; }
        .code-body .number { color: #b392f0; }

        .code-footer {
            padding: 15px 22px;
            background: #0f1a2c;
            border-top: 2px solid #2a3f60;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .tag {
            background: #1e314a;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            color: #b0c8f0;
            border: 1px solid #3f6a9f;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .tag i {
            color: #ffaa5e;
            font-size: 10px;
        }

        .date-badge {
            margin-left: auto;
            font-size: 11px;
            color: #7f9fbf;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #a0b8d0;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .delete-btn:hover {
            color: #ff6b6b;
            background: #2a1f2f;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            background: #1a263a;
            border: 2px solid #3f5a85;
            border-radius: 60px;
            padding: 18px 25px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #ffaa5e;
        }

        .empty-state {
            text-align: center;
            padding: 80px;
            background: #0f1a28;
            border-radius: 50px;
            border: 2px dashed #5f7fb0;
        }

        .empty-state i {
            font-size: 70px;
            color: #ffaa5e;
            margin-bottom: 25px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e3a5f;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px black;
            display: none;
            border-left: 6px solid #ffaa5e;
            z-index: 1000;
            font-family: 'Fira Code', monospace;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vault-bg"></div>
    <div class="container">
        <!-- header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>CODE VAULT · secret snippets</span>
            </div>
            <div class="badge">
                <i class="fas fa-lock"></i> encrypted · local only
            </div>
        </div>

        <!-- main vault card -->
        <div class="vault-card">
            <!-- search -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 search code by title, tag, or content...">
                <button class="btn-save" id="clearSearch" style="padding: 15px 25px;">
                    <i class="fas fa-times"></i> clear
                </button>
            </div>

            <!-- form section -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-pen-fancy"></i> SAVE NEW CODE
                </div>
                
                <input type="text" class="input-field" id="codeTitle" placeholder="📝 code title (e.g., API function, worker script)">
                <textarea class="input-field" id="codeContent" placeholder="📄 paste your code here..."></textarea>
                
                <div class="tag-input">
                    <input type="text" id="codeTags" placeholder="#tags (comma separated: javascript, api, secret)">
                    <button class="btn-save" id="saveCodeBtn">
                        <i class="fas fa-save"></i> SAVE TO VAULT
                    </button>
                </div>
            </div>

            <!-- saved codes section -->
            <div class="section-title" style="margin-top: 20px;">
                <i class="fas fa-archive"></i> YOUR SECRET CODES
            </div>
            
            <div id="codesContainer" class="code-grid">
                <!-- dynamic codes will appear here -->
            </div>
        </div>
    </div>

    <!-- toast notification -->
    <div class="toast" id="toast">✨ copied to clipboard</div>

    <script>
        // CODE VAULT - local storage
        let secretCodes = JSON.parse(localStorage.getItem('secretVault') || '[]');
        let currentSearch = '';

        // DOM elements
        const container = document.getElementById('codesContainer');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');

        // ---------- SAVE CODE ----------
        document.getElementById('saveCodeBtn').addEventListener('click', () => {
            const title = document.getElementById('codeTitle').value.trim();
            const code = document.getElementById('codeContent').value.trim();
            const tagsInput = document.getElementById('codeTags').value.trim();
            
            if (!title || !code) {
                showToast('❌ title and code required', '#ff6b6b');
                return;
            }

            // parse tags
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim().replace(/^#/, '')).filter(t => t) : [];

            // create code object
            const newCode = {
                id: Date.now().toString(),
                title: title,
                code: code,
                tags: tags,
                date: new Date().toLocaleString(),
                language: detectLanguage(code)
            };

            secretCodes.unshift(newCode); // add to top
            localStorage.setItem('secretVault', JSON.stringify(secretCodes));

            // clear form
            document.getElementById('codeTitle').value = '';
            document.getElementById('codeContent').value = '';
            document.getElementById('codeTags').value = '';

            showToast('✅ code saved securely!');
            renderCodes();
        });

        // ---------- RENDER CODES WITH COLOR ----------
        function renderCodes() {
            let filtered = secretCodes;
            
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = secretCodes.filter(code => 
                    code.title.toLowerCase().includes(searchLower) ||
                    code.code.toLowerCase().includes(searchLower) ||
                    code.tags.some(t => t.toLowerCase().includes(searchLower))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-code"></i>
                        <h3>no codes found</h3>
                        <p style="color: #8fa8d0; margin-top: 15px;">save your first secret code above</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(code => `
                <div class="code-item">
                    <div class="code-header">
                        <div class="code-title">
                            <i class="fas fa-file-code"></i>
                            ${escapeHtml(code.title)}
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="copy-btn" onclick="copyCode(this, ${JSON.stringify(escapeHtml(code.code))})">
                                <i class="fas fa-copy"></i> copy
                            </button>
                            <button class="delete-btn" onclick="deleteCode('${code.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="code-body">
                        <pre>${syntaxHighlight(code.code)}</pre>
                    </div>
                    <div class="code-footer">
                        ${code.tags.map(t => `<span class="tag"><i class="fas fa-hashtag"></i>${escapeHtml(t)}</span>`).join('')}
                        <span class="date-badge"><i class="far fa-clock"></i> ${code.date}</span>
                    </div>
                </div>
            `).join('');
        }

        // ---------- SYNTAX HIGHLIGHTING (basic) ----------
        function syntaxHighlight(code) {
            // escape html first
            let escaped = escapeHtml(code);
            
            // color patterns
            const patterns = [
                { regex: /\/\/.*/g, cls: 'comment' }, // comments
                { regex: /".*?"|'.*?'/g, cls: 'string' }, // strings
                { regex: /\b(function|const|let|var|if|else|return|for|while|class|export|import|async|await|try|catch)\b/g, cls: 'keyword' },
                { regex: /\b[0-9]+\b/g, cls: 'number' },
                { regex: /\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\(/g, cls: 'function', replace: '$1(' }
            ];
            
            patterns.forEach(p => {
                escaped = escaped.replace(p.regex, match => {
                    if (p.cls === 'function') {
                        return `<span class="function">${match.replace('(', '</span>(')}`;
                    }
                    return `<span class="${p.cls}">${match}</span>`;
                });
            });
            
            return escaped;
        }

        // ---------- ESCAPE HTML ----------
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ---------- DETECT LANGUAGE (simple) ----------
        function detectLanguage(code) {
            if (code.includes('function') || code.includes('const') || code.includes('let')) return 'javascript';
            if (code.includes('<?php')) return 'php';
            if (code.includes('def ') || code.includes('import ')) return 'python';
            if (code.includes('<html')) return 'html';
            return 'text';
        }

        // ---------- COPY FUNCTION ----------
        window.copyCode = function(btn, code) {
            navigator.clipboard.writeText(decodeHtml(code)).then(() => {
                // visual feedback
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i> copied!';
                
                showToast('📋 code copied to clipboard');
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i> copy';
                }, 2000);
            }).catch(err => {
                showToast('❌ copy failed', '#ff6b6b');
            });
        };

        // decode html entities back to normal text
        function decodeHtml(encoded) {
            const txt = document.createElement('textarea');
            txt.innerHTML = encoded;
            return txt.value;
        }

        // ---------- DELETE CODE ----------
        window.deleteCode = function(id) {
            if (confirm('delete this code from vault?')) {
                secretCodes = secretCodes.filter(c => c.id !== id);
                localStorage.setItem('secretVault', JSON.stringify(secretCodes));
                renderCodes();
                showToast('🗑️ code deleted');
            }
        };

        // ---------- SEARCH ----------
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderCodes();
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            currentSearch = '';
            renderCodes();
        });

        // ---------- TOAST ----------
        function showToast(msg, bgColor = '#1e3a5f') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = bgColor;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // ---------- INITIAL RENDER ----------
        renderCodes();

        // example codes for demo (remove in production)
        if (secretCodes.length === 0) {
            secretCodes.push({
                id: '1',
                title: '✨ example: cloudflare worker',
                code: `// secret worker function
async function handleRequest(request) {
  const url = new URL(request.url);
  
  if (url.pathname === '/secret') {
    return new Response('🔐 vault access', {
      headers: { 'Content-Type': 'text/plain' }
    });
  }
  
  return fetch(request);
}`,
                tags: ['javascript', 'worker', 'example'],
                date: new Date().toLocaleString()
            });
            localStorage.setItem('secretVault', JSON.stringify(secretCodes));
        }
    </script>
</body>
</html>
