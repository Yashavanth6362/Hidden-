<!DOCTYPE html>
<html>
<head>

<title>Secret Diary</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
background:#334155;
color:white;
}

button{
margin-top:12px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

.preview{
margin-top:15px;
}

.preview img{
width:100%;
border-radius:10px;
}

.entry{
background:#1e293b;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.entry img{
width:100%;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<header>
My Secret Diary
</header>

<div class="container">

<div class="card">

<h3>New Diary Entry</h3>

<input id="title" placeholder="Title">

<textarea id="text" rows="4" placeholder="Write your memory..."></textarea>

<input type="file" id="photo">

<div class="preview" id="preview"></div>

<button onclick="saveEntry()">Save Entry</button>

</div>

<div class="card">

<h3>Diary Entries</h3>

<div id="entries"></div>

</div>

</div>

<script>

const API = "https://secretly.yashavanthan22.workers.dev"

let uploadedImage=""

document.getElementById("photo").onchange = async e=>{

const file = e.target.files[0]

const filename = Date.now()+"_"+file.name

const uploadURL =
"https://06bcb893022e1ad43ce8b7200100d3b3.r2.cloudflarestorage.com/user-photos/"+filename

await fetch(uploadURL,{
method:"PUT",
body:file
})

uploadedImage =
"https://pub-c91284acac5e4383a69c7cfd585ae61.r2.dev/"+filename

document.getElementById("preview").innerHTML =
"<img src='"+uploadedImage+"'>"

}

async function saveEntry(){

const title = document.getElementById("title").value
const text = document.getElementById("text").value

await fetch(API+"/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title:title,
text:text,
image:uploadedImage
})

})

loadEntries()

}

async function loadEntries(){

const r = await fetch(API+"/list")
const data = await r.json()

const div = document.getElementById("entries")

div.innerHTML=""

for(let item of data.result){

const r2 = await fetch(API+"/get?id="+item.name.split(":")[1])
const entry = await r2.json()

div.innerHTML +=

"<div class='entry'>" +
"<h3>"+entry.title+"</h3>" +
"<p>"+entry.text+"</p>" +
(entry.image ? "<img src='"+entry.image+"'>" : "") +
"</div>"

}

}

loadEntries()

</script>

</body>
</html>
