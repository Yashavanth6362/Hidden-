<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memory Vault</title>

<style>

body{
font-family:system-ui;
background:#020617;
color:white;
margin:0;
}

header{
padding:18px;
text-align:center;
font-size:22px;
border-bottom:1px solid #334155;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,textarea,select{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#334155;
color:white;
}

button{
margin-top:10px;
padding:10px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
}

.card img{
width:100%;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>Memory Vault</header>

<div class="container">

<h3>New Entry</h3>

<input id="title" placeholder="Title">

<textarea id="content" placeholder="Write memory #tags"></textarea>

<select id="category">
<option>Love</option>
<option>Ideas</option>
<option>Fake People</option>
<option>Secrets</option>
<option>Documents</option>
</select>

<input type="file" id="image">

<button onclick="save()">Save Entry</button>

<h3>Diary Entries</h3>

<div id="entries"></div>

</div>

<script>

const API="https://secretly.yashavanthan22.workers.dev"

async function save(){

const title=document.getElementById("title").value
const content=document.getElementById("content").value
const category=document.getElementById("category").value
const file=document.getElementById("image").files[0]

let image=""

if(file){

const form=new FormData()
form.append("file",file)

const r=await fetch(API+"/upload",{
method:"POST",
body:form
})

const d=await r.json()

image=d.file

}

await fetch(API+"/save",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
title,
content,
category,
image,
time:Date.now()
})
})

load()

}

async function load(){

const res=await fetch(API+"/list")
const data=await res.json()

const box=document.getElementById("entries")
box.innerHTML=""

for(let item of data.result){

const id=item.name.replace("diary:","")

const r=await fetch(API+"/get?id="+id)
const d=await r.json()

let img=""

if(d.image){
img=`<img src="https://pub-c91284acac5e4383a69c7cfd585ae61.r2.dev/${d.image}">`
}

box.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<p>${d.content}</p>
${img}
</div>
`

}

}

load()

</script>

</body>
</html>
